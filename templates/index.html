<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Crowd Choir Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="{{ url_for('static', filename='vendor/tone.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/socket.io.min.js') }}"></script>
    <script>window.MUSIC_DATA = {{ music_data | tojson }};</script>
</head>
<body>
    <header>
        <h1>Crowd Choir Test</h1>
        <div class="header-controls">
            <button id="gyroToggle" class="gyro-btn" style="display: none;">Enable Gyroscope</button>
            <button id="startAudio">Start Audio</button>
        </div>
    </header>
    
    <div class="main-container">
        <div id="xy-pad" class="xy-pad">
            <div class="pad-instructions">
                <p>Touch or click to control filter</p>
                <div class="filter-values">
                    <span id="cutoff-value">Cutoff: 1000 Hz</span>
                    <span id="resonance-value">Resonance: 1</span>
                </div>
            </div>
            <div id="touch-marker" class="touch-marker"></div>
        </div>
    </div>
    
    <div class="sample-selector">
        <div class="sample-buttons">
            <button id="sample-mello_flute" class="sample-btn active">Mello Flute</button>
            <button id="sample-mello_ohs" class="sample-btn">Mello OHs</button>
        </div>
    </div>
    
    <script type="module" src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
