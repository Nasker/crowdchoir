# /etc/dnsmasq.conf
# DHCP + DNS for the captive portal. Hands out leases on the AP subnet and
# resolves EVERY hostname to the Pi (DNS spoofing) so phones see a portal
# instead of "no internet" and stay connected.

interface=wlan0
bind-interfaces

# DHCP range on the AP subnet. The Pi itself is 10.0.0.1 (set via dhcpcd/static).
dhcp-range=10.0.0.10,10.0.0.250,255.255.255.0,12h
dhcp-option=option:router,10.0.0.1
dhcp-option=option:dns-server,10.0.0.1

# --- DNS spoofing -----------------------------------------------------------
# Resolve all domains to the Pi. This is what triggers the captive portal and
# keeps phones from abandoning the network.
address=/#/10.0.0.1

# Friendly hostname for the HTTPS app (must match a TLS SAN, see README).
address=/choir.party/10.0.0.1

# Speed up captive detection: don't forward upstream, answer locally.
no-resolv
log-queries
