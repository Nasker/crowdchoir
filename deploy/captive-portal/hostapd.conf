# /etc/hostapd/hostapd.conf
# Turns the Pi's WiFi into an open access point named "CrowdChoir".
# Adjust `interface` to match your WiFi device (check with `iw dev`).

interface=wlan0
driver=nl80211

ssid=CrowdChoir
hw_mode=g
channel=7
country_code=US

# Open network (no password) so the crowd can join instantly.
auth_algs=1
wmm_enabled=1
ieee80211n=1

# If you prefer a password, uncomment:
# wpa=2
# wpa_passphrase=singalong
# wpa_key_mgmt=WPA-PSK
# rsn_pairwise=CCMP
